<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    // Inicializar Supabase
    const supabaseUrl = "https://iacjmzaihvzjotehsdjd.supabase.co";
    const supabaseKey = "sb_publishable_CJnhBJENcZ5EyjTasNQriA_Ka4FHCtB";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    // Capturar formulario e inputs
    const loginForm = document.getElementById("loginForm");
    const emailInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const togglePasswordBtn = document.getElementById('togglePassword');
    const eyeIcon = document.getElementById('eyeIcon');

    // Lógica para mostrar/ocultar contraseña
    togglePasswordBtn.addEventListener('click', () => {
        const isPassword = passwordInput.getAttribute('type') === 'password';
        passwordInput.setAttribute('type', isPassword ? 'text' : 'password');
        eyeIcon.textContent = isPassword ? 'visibility_off' : 'visibility';
    });

    // Manejar el submit del formulario
    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault(); // Evitar recarga
        
        const email = emailInput.value;
        const password = passwordInput.value;

        console.log("Intentando iniciar sesión con Supabase...");

        // Implementar login con Supabase
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });

        console.log("Resultado de login:", { data, error });

        if (error) {
            alert("Acceso denegado");
        } else {
            alert("Registro válido");
            // Redirigir al admin panel si el login es exitoso
            window.location.href = "admin.html";
        }
    });
});
</script>
